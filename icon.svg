<svg width="128" height="128" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 
      Icon for Get Tabs Tool
      A stylized stack of three browser tabs, now properly centered.
    -->
    <defs>
        <!-- A vibrant color gradient for the front-most tab -->
        <linearGradient id="tabGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
        <!-- A soft drop shadow filter to give the icon depth -->
        <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
            <feOffset dx="1" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Group to apply the drop shadow to all tabs at once -->
    <g filter="url(#dropShadow)">
        <!-- Back tab (shifted left for centering) -->
        <rect x="4" y="24" width="48" height="32" rx="4" fill="#4b5563"/>
        
        <!-- Middle tab (shifted left for centering) -->
        <rect x="8" y="16" width="48" height="32" rx="4" fill="#9ca3af"/>
        
        <!-- Front tab with gradient (shifted left for centering) -->
        <rect x="12" y="8" width="48" height="32" rx="4" fill="url(#tabGradient)"/>
    </g>
</svg>
